baseURL: 'https://jiangbyte.github.io'
locale: en
defaultContentLanguage: en
defaultContentLanguageInSubdir: false
title: Charlie Byte Biu~
theme: blowfish

enableRobotsTXT: true
summaryLength: 30
hasCJKLanguage: false
enableEmoji: true

mainSections: ["posts"]

permalinks:
  posts: /posts/:year/:month/:day/:slug/

pagination:
  pagerSize: 6
  path: "page"

taxonomies:
  tag: tags
  category: categories
  author: authors
  series: series

imaging:
  anchor: 'Center'

markup:
  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      extras:
        delete:
          enable: true
        insert:
          enable: true
        mark:
          enable: true
        subscript:
          enable: true
        superscript:
          enable: true
      strikethrough: true
  highlight:
    codeFences: true
    guessSyntax: false
    lineNos: false
    lineNumbersInTable: false
    noClasses: false
    style: github
    tabWidth: 2

outputs:
  home: ["HTML", "RSS", "JSON"]
  section: ["HTML", "RSS", "JSON"]

related:
  threshold: 0
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 100
    - name: series
      weight: 50
    - name: authors
      weight: 20
    - name: date
      weight: 10

module:
  hugoVersion:
    extended: true
    min: 0.158.0
