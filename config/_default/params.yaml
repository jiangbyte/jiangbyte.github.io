# Basic site info
description: "Charlie Byte Biu~ - A personal blog by Charlie"
keywords: ["Blog", "Technology", "Programming"]
defaultAuthor: "Charlie"
language: "en"
shortName: "Charlie Byte Biu~"
images:
  - "/images/og-default.avif"

# Favicon
# favicon:
#   svg: "/favicon.svg"

# Author info
author:
  name: "Charlie"
  title: "Charlie Byte Biu~"
  description: "Stay curious, keep coding."
  avatar: "https://avatars.githubusercontent.com/jiangbyte"
  social:
    - name: "GitHub"
      url: "https://github.com/jiangbyte"
      icon: "github"

# Header
header:
  sticky: true
  logo:
    image: "https://avatars.githubusercontent.com/jiangbyte"
    link: "/"
  showThemeSwitch: false
  showDarkModeSwitch: true
  showLanguageSwitch: false
  languageSwitchMode: "dropdown"

# Dock
dock: "scroll"

# Content width
contentWidth: "56rem"

# TOC
toc:
  enabled: true
  position: "center"

# Color scheme
colorScheme: "default"
themes:
  default:
    name: "Default"
    order: 1
  emerald:
    name: "Emerald"
    order: 2
  nord:
    name: "Nord"
    order: 3
  sunset:
    name: "Sunset"
    order: 4
  dracula:
    name: "Dracula"
    order: 5
  minimal:
    name: "Minimal"
    order: 6

# Home page
home:
  recentPostsCount: 5
  contentOrder:
    - author-section
    - recent-posts

# Post
post:
  showRelated: false
  license:
    show: false

# Comments
comments:
  enabled: false

# Analytics
analytics:
  enabled: false

# Code block
codeblock:
  collapse:
    enabled: true
    defaultState: expanded
    autoCollapseLines: 50
    autoCollapseHeight: 400
    collapsedHeight: 120

# Reading progress
readingProgress:
  enabled: true
  showOnHomepage: false

# Date format
dateFormat:
  full: ":date_full"
  long: ":date_long"
  medium: ":date_medium"
  short: ":date_short"
